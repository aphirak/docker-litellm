name: test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - '.github/workflows/shellcheck.yml'
      - '.github/workflows/proxy_test.yml'
      - 'docker-compose.yml'
      - 'litellm.env.example'
      - 'scripts/**/*.sh'

jobs:
  shellcheck:
    if: github.repository_owner == 'hwdsl2'
    uses: ./.github/workflows/shellcheck.yml

  proxy_test:
    if: github.repository_owner == 'hwdsl2'
    uses: ./.github/workflows/proxy_test.yml

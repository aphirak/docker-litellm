name: proxy_test

on: workflow_call

jobs:
  compose_config:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate compose file
        run: |
          [ ! -x /usr/bin/docker ] && exit 1

          cd "$GITHUB_WORKSPACE"
          pwd

          docker compose version
          docker compose -f docker-compose.yml config >/tmp/litellm-compose.yml

          docker compose -f docker-compose.yml config --services | grep -qx 'litellm-init'
          docker compose -f docker-compose.yml config --services | grep -qx 'db'
          docker compose -f docker-compose.yml config --services | grep -qx 'litellm'

          test -r scripts/litellm-init.sh
          grep -q 'POSTGRES_PASSWORD_FILE: /var/lib/litellm-secrets/postgres_password' docker-compose.yml
          grep -q 'LITELLM_POSTGRES_PASSWORD_FILE=/var/lib/litellm-secrets/postgres_password' docker-compose.yml
          grep -q 'litellm-secrets:' docker-compose.yml

          ! grep -q 'POSTGRES_PASSWORD: litellm' docker-compose.yml
          ! grep -q 'postgresql://litellm:litellm' docker-compose.yml

  proxy_test:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    needs: compose_config
    strategy:
      matrix:
        test_id: [no-env, with-env, with-master-key, with-mcp, with-shared-vol, with-litellm-shared]
      fail-fast: false
    env:
      TEST_ID: ${{ matrix.test_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Test
        run: |
          [ ! -x /usr/bin/docker ] && exit 1

          cd "$GITHUB_WORKSPACE"
          pwd
          ls -ld litellm.env.example

          sed -i \
            -e '/LITELLM_LOG_LEVEL=/s/# //' \
            litellm.env.example

          set -x

          docker build -t litellm-test .

          if [ "$TEST_ID" = "with-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v litellm-test-data:/etc/litellm \
              -v ./litellm.env.example:/litellm.env:ro \
              -p 4000:4000/tcp \
              -d litellm-test
          elif [ "$TEST_ID" = "no-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v litellm-test-data:/etc/litellm \
              -p 4000:4000/tcp \
              -d litellm-test
          elif [ "$TEST_ID" = "with-master-key" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v litellm-test-data:/etc/litellm \
              -e LITELLM_MASTER_KEY=sk-test-master-key \
              -p 4000:4000/tcp \
              -d litellm-test
          elif [ "$TEST_ID" = "with-mcp" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v litellm-test-data:/etc/litellm \
              -e LITELLM_MCP_URL=http://127.0.0.1:9999/mcp \
              -e LITELLM_MCP_API_KEY=test-mcp-key \
              -p 4000:4000/tcp \
              -d litellm-test
          elif [ "$TEST_ID" = "with-litellm-shared" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v litellm-test-data:/etc/litellm \
              -v litellm-test-litellm-shared:/var/lib/litellm-shared \
              -p 4000:4000/tcp \
              -d litellm-test
          elif [ "$TEST_ID" = "with-shared-vol" ]; then
            # Pre-populate shared volumes with fake API keys
            docker volume create litellm-test-ollama-shared
            docker volume create litellm-test-mcp-shared
            docker run --rm \
              -v litellm-test-ollama-shared:/shared \
              alpine sh -c 'echo -n "test-ollama-key-12345" > /shared/.api_key'
            docker run --rm \
              -v litellm-test-mcp-shared:/shared \
              alpine sh -c 'echo -n "test-mcp-key-67890" > /shared/.api_key'
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v litellm-test-data:/etc/litellm \
              -v litellm-test-ollama-shared:/var/lib/ollama-shared:ro \
              -v litellm-test-mcp-shared:/var/lib/mcp-shared:ro \
              -e LITELLM_OLLAMA_BASE_URL=http://127.0.0.1:11434 \
              -e LITELLM_MCP_URL=http://127.0.0.1:9999/mcp \
              -p 4000:4000/tcp \
              -d litellm-test
          fi

          # Wait for proxy to be ready (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify proxy health endpoint
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness

          # Verify persistent data files were created
          docker exec "$TEST_ID" ls -l /etc/litellm/.master_key
          docker exec "$TEST_ID" ls -l /etc/litellm/.initialized
          docker exec "$TEST_ID" ls -l /etc/litellm/config.yaml

          # Verify master key is non-empty and starts with 'sk-'
          docker exec "$TEST_ID" grep -q '^sk-' /etc/litellm/.master_key

          # Capture master key for API tests
          MASTER_KEY=$(docker exec "$TEST_ID" cat /etc/litellm/.master_key)

          # Verify pre-set master key is used when LITELLM_MASTER_KEY env var was provided
          if [ "$TEST_ID" = "with-master-key" ]; then
            docker exec "$TEST_ID" grep -qF 'sk-test-master-key' /etc/litellm/.master_key \
              || { echo "Pre-set master key not used"; exit 1; }
          fi

          # Verify auth is enforced: request without key should return 401
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            http://127.0.0.1:4000/v1/models 2>/dev/null || true)
          [ "$http_code" = "401" ] || { echo "Expected 401 without key, got $http_code"; exit 1; }

          # Test OpenAI-compatible models endpoint
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/v1/models \
            -H "Authorization: Bearer $MASTER_KEY"

          # Test /health/readiness endpoint
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/readiness

          # Test litellm_manage commands
          docker exec "$TEST_ID" litellm_manage --showkey
          docker exec "$TEST_ID" litellm_manage --getkey
          docker exec "$TEST_ID" litellm_manage --listmodels

          # Test --addmodel: writes to config.yaml and auto-restarts proxy via kill -TERM 1
          docker exec "$TEST_ID" litellm_manage --addmodel openai/gpt-4o-test --alias ci-test-model --supports-function-calling || true

          # Wait for shutdown before polling
          sleep 15

          # Wait for proxy to restart (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify proxy is healthy after addmodel restart
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness

          # Verify model was written to config.yaml
          docker exec "$TEST_ID" grep -q 'ci-test-model' /etc/litellm/config.yaml
          docker exec "$TEST_ID" python3 -c \
            "import yaml; c=yaml.safe_load(open('/etc/litellm/config.yaml')); m=next(m for m in c['model_list'] if m.get('model_name')=='ci-test-model'); assert m['model_info']['supports_function_calling'] is True"

          # Retrieve model ID for removal test
          MODEL_ID=$(docker exec "$TEST_ID" python3 -c \
            "import yaml; c=yaml.safe_load(open('/etc/litellm/config.yaml')); print(next(m['model_info']['id'] for m in c['model_list'] if m.get('model_name')=='ci-test-model'))")
          echo "Model ID: $MODEL_ID"

          # List models after add (reads in-memory model list from config)
          docker exec "$TEST_ID" litellm_manage --listmodels

          # Test --removemodel: removes from config.yaml and auto-restarts proxy
          docker exec "$TEST_ID" litellm_manage --removemodel "$MODEL_ID" || true

          # Wait for shutdown before polling
          sleep 15

          # Wait for proxy to restart (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify proxy is healthy after removemodel restart
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness

          # Verify model was removed from config.yaml
          ! docker exec "$TEST_ID" grep -q 'ci-test-model' /etc/litellm/config.yaml

          # MCP integration test: verify mcp_servers block in config.yaml
          if [ "$TEST_ID" = "with-mcp" ]; then
            docker exec "$TEST_ID" grep -q 'mcp_servers' /etc/litellm/config.yaml \
              || { echo "mcp_servers block missing from config.yaml"; exit 1; }
            docker exec "$TEST_ID" grep -q 'docker_mcp_gateway' /etc/litellm/config.yaml \
              || { echo "docker_mcp_gateway entry missing"; exit 1; }
            docker exec "$TEST_ID" grep -q 'http://127.0.0.1:9999/mcp' /etc/litellm/config.yaml \
              || { echo "MCP URL not written to config.yaml"; exit 1; }
            docker exec "$TEST_ID" grep -q 'bearer_token' /etc/litellm/config.yaml \
              || { echo "auth_type bearer_token missing"; exit 1; }
            docker exec "$TEST_ID" grep -q 'test-mcp-key' /etc/litellm/config.yaml \
              || { echo "MCP API key not written to config.yaml"; exit 1; }
            # Test --listmcp
            docker exec "$TEST_ID" litellm_manage --listmcp
            # Test --addmcp
            docker exec "$TEST_ID" litellm_manage --addmcp ci-mcp http://127.0.0.1:8888/mcp --key ci-key || true
          fi

          # Manual restart: test master key persistence
          docker restart "$TEST_ID"

          # Wait for shutdown before polling
          sleep 15

          # Wait for proxy to come back (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify proxy came back healthy
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:4000/health/liveliness

          # Verify master key persisted across restart
          docker exec "$TEST_ID" grep -qF "$MASTER_KEY" /etc/litellm/.master_key

          # Litellm-shared volume test: verify master key was copied to shared volume
          if [ "$TEST_ID" = "with-litellm-shared" ]; then
            SHARED_KEY=$(docker exec "$TEST_ID" cat /var/lib/litellm-shared/.api_key 2>/dev/null || true)
            [ "$MASTER_KEY" = "$SHARED_KEY" ] \
              || { echo "Master key not copied to litellm-shared volume (expected '$MASTER_KEY', got '$SHARED_KEY')"; exit 1; }
          fi

          # Shared volume test: verify keys were auto-read from shared volumes
          if [ "$TEST_ID" = "with-shared-vol" ]; then
            # Verify Ollama API key was read and used in config
            docker exec "$TEST_ID" grep -q 'test-ollama-key-12345' /etc/litellm/config.yaml \
              || { echo "Ollama API key from shared volume not found in config.yaml"; exit 1; }
            docker exec "$TEST_ID" python3 -c \
              "import yaml; c=yaml.safe_load(open('/etc/litellm/config.yaml')); ml=c.get('model_list', []); old=[m for m in ml if m.get('model_name')=='ollama/llama3.2:3b']; chat=[m for m in ml if m.get('model_name')=='ollama-chat/llama3.2:3b']; assert len(old)==1, old; assert len(chat)==1, chat; assert old[0]['litellm_params']['model']=='ollama/llama3.2:3b'; assert chat[0]['litellm_params']['model']=='ollama_chat/llama3.2:3b'; assert old[0]['litellm_params']['api_base']=='http://127.0.0.1:11434'; assert chat[0]['litellm_params']['api_base']=='http://127.0.0.1:11434'; assert chat[0]['litellm_params']['api_key']=='test-ollama-key-12345'; assert chat[0]['model_info']['supports_function_calling'] is True"
            # Verify MCP API key was read and used in config
            docker exec "$TEST_ID" grep -q 'test-mcp-key-67890' /etc/litellm/config.yaml \
              || { echo "MCP API key from shared volume not found in config.yaml"; exit 1; }
          fi

          exit 0
      - name: Clear
        if: always()
        run: |
          docker rm -f "$TEST_ID" || true
          docker volume rm litellm-test-data || true
          docker volume rm litellm-test-ollama-shared || true
          docker volume rm litellm-test-mcp-shared || true
          docker volume rm litellm-test-litellm-shared || true
          docker rmi litellm-test || true
